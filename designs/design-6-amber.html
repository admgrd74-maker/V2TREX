<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Design 6 — Amber</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@700;900&family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#0e0a04;
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:48px 24px;
  font-family:'Inter',sans-serif;
}

.design-label{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);
  font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.2em;
  color:rgba(251,191,36,.45);text-transform:uppercase;
  background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.18);
  padding:6px 18px;border-radius:20px;
}

/* ── Téléphone amber ── */
.phone{
  width:390px;
  background:#0c0802;
  border-radius:50px;
  overflow:hidden;
  box-shadow:
    0 0 0 1px rgba(251,191,36,.10),
    0 0 0 8px rgba(0,0,0,.95),
    0 0 0 9px rgba(251,191,36,.06),
    0 60px 140px rgba(0,0,0,.92),
    0 0 100px rgba(251,191,36,.05);
  position:relative;
}

/* Notch */
.notch{
  width:130px;height:36px;
  background:#080600;
  border-radius:0 0 28px 28px;
  margin:0 auto;z-index:10;position:relative;
}

/* Tag */
.lesson-tag{
  text-align:center;
  font-family:'JetBrains Mono',monospace;
  font-size:9px;letter-spacing:.28em;
  color:rgba(251,191,36,.35);text-transform:uppercase;
  padding:12px 0;
}

/* ══════════════════════════════
   TABLEAU — style terminal amber
   Chaque carte = ligne de départ
══════════════════════════════ */
.board{
  background:#090700;
  border-top:1px solid rgba(251,191,36,.10);
  border-bottom:1px solid rgba(251,191,36,.10);
  padding:0;
  position:relative;overflow:hidden;
}

/* Scanlines subtiles */
.board::before{
  content:'';position:absolute;inset:0;z-index:0;
  background:repeating-linear-gradient(
    to bottom,
    transparent 0px,
    transparent 3px,
    rgba(251,191,36,.012) 3px,
    rgba(251,191,36,.012) 4px
  );
  pointer-events:none;
}

/* Halo amber centré */
.board::after{
  content:'';position:absolute;inset:0;z-index:0;
  background:radial-gradient(ellipse 100% 80% at 50% 50%, rgba(251,191,36,.05) 0%, transparent 70%);
  pointer-events:none;
}

.card{
  padding:20px 24px 18px 22px;
  position:relative;z-index:1;
}
.card+.card{
  border-top:1px solid rgba(251,191,36,.07);
}

/* Accent gauche */
.card::before{
  content:'';position:absolute;
  left:0;top:20%;bottom:20%;width:2px;border-radius:0 2px 2px 0;
  background:rgba(251,191,36,.50);
}

.badge{
  position:absolute;top:9px;right:14px;
  font-family:'JetBrains Mono',monospace;font-size:8px;
  letter-spacing:.12em;text-transform:lowercase;
  color:rgba(251,191,36,.25);
}

.c-fr{
  font-family:'JetBrains Mono',monospace;font-weight:400;
  font-size:10px;color:rgba(251,191,36,.30);
  letter-spacing:.08em;margin-bottom:4px;
}

/* Le mot EN — amber pur, très grand */
.c-en{
  font-family:'Lexend',sans-serif;font-weight:900;
  font-size:46px;
  color:#fbbf24;
  line-height:1.0;letter-spacing:-.025em;
  text-shadow:0 0 40px rgba(251,191,36,.30), 0 0 80px rgba(251,191,36,.10);
}
.c-en.sm{font-size:38px;}

.c-phon{
  font-family:'JetBrains Mono',monospace;
  font-size:12px;color:rgba(251,191,36,.55);
  margin-top:5px;letter-spacing:.08em;
}

/* ── Scène vocale ── */
.stage{
  display:flex;justify-content:center;align-items:flex-end;
  gap:10px;padding:18px 20px 12px;
  background:rgba(0,0,0,.20);
}
.seat{display:flex;flex-direction:column;align-items:center;gap:4px;width:70px;opacity:.18;}
.seat.on{opacity:1;}
.avatar{
  width:38px;height:38px;border-radius:50%;
  border:1px solid rgba(251,191,36,.12);
  background:rgba(251,191,36,.04);
  display:flex;align-items:center;justify-content:center;
}
.seat.on .avatar{
  width:64px;height:64px;
  border-color:rgba(251,191,36,.65);
  box-shadow:0 0 0 3px rgba(251,191,36,.10), 0 0 30px rgba(251,191,36,.30);
  background:rgba(251,191,36,.07);
}
.avatar svg{width:24px;height:24px;}
.seat.on .avatar svg{width:40px;height:40px;}
.sname{
  font-family:'JetBrains Mono',monospace;
  font-size:8px;color:rgba(251,191,36,.22);
  letter-spacing:.12em;text-transform:uppercase;
}
.seat.on .sname{color:rgba(251,191,36,.70);font-size:9px;}
.swave{display:flex;align-items:flex-end;gap:2px;height:10px;}
.swave span{width:2px;border-radius:2px;background:rgba(251,191,36,.55);}
.swave span:nth-child(1){height:3px;}
.swave span:nth-child(2){height:9px;}
.swave span:nth-child(3){height:5px;}
.swave span:nth-child(4){height:8px;}
.swave span:nth-child(5){height:4px;}

/* ── Panel micro ── */
.panel{
  margin:6px 16px;padding:10px 14px 12px;
  border:1px solid rgba(251,191,36,.08);
  border-radius:18px;
  background:rgba(251,191,36,.025);
  display:flex;flex-direction:column;align-items:center;gap:7px;
  opacity:.25;
}
.pwave{width:100%;height:14px;border-radius:4px;background:rgba(251,191,36,.05);}
.mic{
  width:52px;height:52px;border-radius:50%;
  border:1px solid rgba(251,191,36,.15);
  background:rgba(251,191,36,.04);
  display:flex;align-items:center;justify-content:center;
  font-size:21px;
}
.ctrl{display:flex;gap:6px;width:100%;}
.cbtn{
  flex:1;padding:9px 6px;border-radius:10px;
  border:1px solid rgba(251,191,36,.08);
  background:rgba(251,191,36,.03);
  color:rgba(251,191,36,.28);
  font-family:'JetBrains Mono',monospace;font-size:10px;
  text-align:center;
}

/* ── Nav ── */
.bnav{
  display:flex;justify-content:space-around;
  padding:10px 32px 26px;
  border-top:1px solid rgba(251,191,36,.07);
  margin-top:4px;
}
.bico{color:rgba(251,191,36,.15);}
.bico.on{color:rgba(251,191,36,.65);}
</style>
</head>
<body>
<div class="design-label">Design 6 — Amber (terminal chaud, monochrome)</div>

<div class="phone">
  <div class="notch"></div>
  <div class="lesson-tag">● méthode audio · leçon 1 · fr → en</div>

  <div class="board">
    <div class="card">
      <div class="badge">contraction</div>
      <div class="c-fr">c'est possible</div>
      <div class="c-en">it is possible</div>
      <div class="c-phon">it iz po-si-beul</div>
    </div>
    <div class="card">
      <div class="badge">se dit</div>
      <div class="c-fr">la table</div>
      <div class="c-en sm">the table</div>
      <div class="c-phon">ze téï-beul</div>
    </div>
  </div>

  <div class="stage">
    <div class="seat">
      <div class="avatar"><svg viewBox="0 0 56 62" fill="none"><circle cx="28" cy="19" r="13" fill="#fbbf24" opacity=".5"/><path d="M4 60c0-18 48-18 48 0" fill="#fbbf24" opacity=".5"/></svg></div>
      <div class="sname">Sophie</div>
      <div class="swave"><span></span><span></span><span></span><span></span><span></span></div>
    </div>
    <div class="seat on">
      <div class="avatar"><svg viewBox="0 0 56 62" fill="none"><circle cx="28" cy="19" r="13" fill="#fbbf24" opacity=".80"/><path d="M4 60c0-18 48-18 48 0" fill="#fbbf24" opacity=".80"/></svg></div>
      <div class="sname">Marc</div>
      <div class="swave"><span></span><span></span><span></span><span></span><span></span></div>
    </div>
    <div class="seat">
      <div class="avatar"><svg viewBox="0 0 56 62" fill="none"><circle cx="28" cy="19" r="13" fill="#fbbf24" opacity=".5"/><path d="M4 60c0-18 48-18 48 0" fill="#fbbf24" opacity=".5"/></svg></div>
      <div class="sname">Julien</div>
      <div class="swave"><span></span><span></span><span></span><span></span><span></span></div>
    </div>
  </div>

  <div class="panel">
    <div class="pwave"></div>
    <div class="mic">🎙</div>
    <div class="ctrl">
      <div class="cbtn">▶ réponse</div>
      <div class="cbtn">Continuer →</div>
      <div class="cbtn">↺</div>
    </div>
  </div>

  <div class="bnav">
    <div class="bico"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></div>
    <div class="bico on"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
    <div class="bico"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></div>
  </div>
</div>
</body>
</html>

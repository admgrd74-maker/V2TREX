<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Bouton question — 4 traitements premium</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@1,9..144,500&family=JetBrains+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#111317;min-height:100vh;
  display:flex;align-items:center;justify-content:center;gap:26px;
  padding:60px 28px;font-family:'JetBrains Mono',monospace;flex-wrap:wrap;
}
.label{
  position:fixed;top:18px;left:50%;transform:translateX(-50%);
  font-size:10px;letter-spacing:.18em;color:rgba(255,255,255,.22);text-transform:uppercase;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  padding:5px 16px;border-radius:20px;white-space:nowrap;z-index:50;
}
.panel{
  width:240px;height:400px;border-radius:32px;
  background:#1A2232;
  box-shadow:0 0 0 1px rgba(255,255,255,.07),0 40px 80px rgba(0,0,0,.7);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:46px;
  position:relative;overflow:hidden;
}
.cap{
  font-size:9px;letter-spacing:.15em;color:rgba(255,255,255,.18);
  text-transform:uppercase;text-align:center;margin-top:14px;
}
.btn{cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:50%;}
.btn:active{transform:scale(.95);}

/* ══════════════════════════════════════════════
   1 · LAITON MAT GRAVÉ — plaque d'instrument ancien
══════════════════════════════════════════════ */
.brass{
  position:relative;
  /* métal brossé : conic à nombreux arrêts, sans blanc pur */
  background:
    radial-gradient(circle at 38% 30%, rgba(255,236,190,.22) 0%, transparent 55%),
    conic-gradient(from 210deg,
      #8A6A28, #A8853A, #93722C, #BC9A4C, #9A7930,
      #876726, #B08D40, #8E6E2A, #A8853A, #8A6A28);
  /* rim usiné : lumière en haut, ombre en bas */
  box-shadow:
    inset 0 1.5px 1px rgba(255,240,200,.45),
    inset 0 -2.5px 4px rgba(40,24,4,.55),
    0 6px 18px rgba(0,0,0,.50),
    0 1px 3px rgba(0,0,0,.45);
}
/* anneau gravé fin, en retrait du bord */
.brass::before{
  content:'';position:absolute;inset:7%;border-radius:50%;
  border:1px solid rgba(45,28,6,.45);
  box-shadow:0 1px 0 rgba(255,240,200,.28);
  pointer-events:none;
}
.brass .q{
  font-family:'Syne',sans-serif;font-weight:800;
  /* gravé en creux : plus sombre que la matière, ombre interne haute, éclat bas */
  color:#5C451A;
  text-shadow:
    0 -1px 1px rgba(30,18,2,.65),
    0 1.5px 0 rgba(255,238,190,.40);
}
.brass.big{width:96px;height:96px;}
.brass.big .q{font-size:46px;}
.brass.small{width:56px;height:56px;}
.brass.small .q{font-size:27px;}

/* ══════════════════════════════════════════════
   2 · VERRE FUMÉ — glassmorphism, lueur ambre
══════════════════════════════════════════════ */
/* halo flou derrière le panneau pour révéler la transparence du verre */
.glow-blob{
  position:absolute;width:150px;height:150px;border-radius:50%;
  background:radial-gradient(circle, rgba(251,191,36,.30) 0%, transparent 70%);
  filter:blur(18px);pointer-events:none;
}
.glass{
  position:relative;
  background:rgba(22,30,48,.48);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  border:1px solid rgba(251,191,36,.32);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.14),
    inset 0 -8px 18px rgba(10,14,24,.35),
    0 10px 30px rgba(0,0,0,.45);
}
.glass .q{
  font-family:'Syne',sans-serif;font-weight:700;
  color:#FCD34D;
  text-shadow:0 0 16px rgba(252,211,77,.65),0 0 38px rgba(252,211,77,.30);
}
.glass.big{width:96px;height:96px;}
.glass.big .q{font-size:42px;}
.glass.small{width:56px;height:56px;}
.glass.small .q{font-size:25px;}

/* ══════════════════════════════════════════════
   3 · RELIEF SUBTIL — extrudé du fond, soft 3D
══════════════════════════════════════════════ */
.soft{
  background:linear-gradient(145deg,#1E2940,#161E2F);
  box-shadow:
    7px 7px 16px rgba(6,9,16,.65),
    -6px -6px 14px rgba(64,80,112,.22),
    inset 0 0 0 rgba(0,0,0,0);
}
.soft .q{
  font-family:'Syne',sans-serif;font-weight:700;
  color:rgba(252,211,77,.85);
}
.soft:active{
  box-shadow:
    inset 5px 5px 12px rgba(6,9,16,.65),
    inset -4px -4px 10px rgba(64,80,112,.20);
}
.soft.big{width:96px;height:96px;}
.soft.big .q{font-size:40px;}
.soft.small{width:56px;height:56px;}
.soft.small .q{font-size:24px;}

/* ══════════════════════════════════════════════
   4 · TYPOGRAPHIQUE PUR — le « ? » à la craie, zéro chrome
══════════════════════════════════════════════ */
.typo{
  background:none;border-radius:0;position:relative;
}
.typo .q{
  font-family:'Fraunces',serif;font-style:italic;font-weight:500;
  color:#FCD34D;
  text-shadow:0 0 26px rgba(252,211,77,.40),0 0 70px rgba(252,211,77,.18);
  animation:q-breathe 3.8s ease-in-out infinite;
}
@keyframes q-breathe{
  0%,100%{opacity:.86;text-shadow:0 0 22px rgba(252,211,77,.32),0 0 60px rgba(252,211,77,.14);}
  50%{opacity:1;text-shadow:0 0 30px rgba(252,211,77,.50),0 0 84px rgba(252,211,77,.24);}
}
/* petit point d'appui — comme le point du ? posé sur une ligne de craie */
.typo::after{
  content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);
  width:26px;height:1.5px;
  background:linear-gradient(to right,transparent,rgba(252,211,77,.45),transparent);
}
.typo.big .q{font-size:72px;}
.typo.big{width:96px;height:104px;}
.typo.small .q{font-size:42px;}
.typo.small{width:56px;height:62px;}
</style>
</head>
<body>
<div class="label">Bouton « question » — 4 traitements premium (aucun reflet glossy)</div>

<!-- ═══════ 1 · LAITON MAT GRAVÉ ═══════ -->
<div>
  <div class="panel">
    <div class="btn brass big"><span class="q">?</span></div>
    <div class="btn brass small"><span class="q">?</span></div>
  </div>
  <div class="cap">1 · laiton mat gravé — instrument ancien</div>
</div>

<!-- ═══════ 2 · VERRE FUMÉ ═══════ -->
<div>
  <div class="panel">
    <div class="glow-blob" style="top:60px;left:40px;"></div>
    <div class="glow-blob" style="bottom:50px;right:30px;width:110px;height:110px;"></div>
    <div class="btn glass big"><span class="q">?</span></div>
    <div class="btn glass small"><span class="q">?</span></div>
  </div>
  <div class="cap">2 · verre fumé — bordure et lueur ambre</div>
</div>

<!-- ═══════ 3 · RELIEF SUBTIL ═══════ -->
<div>
  <div class="panel">
    <div class="btn soft big"><span class="q">?</span></div>
    <div class="btn soft small"><span class="q">?</span></div>
  </div>
  <div class="cap">3 · relief subtil — extrudé du fond (clique !)</div>
</div>

<!-- ═══════ 4 · TYPOGRAPHIQUE PUR ═══════ -->
<div>
  <div class="panel">
    <div class="btn typo big"><span class="q">?</span></div>
    <div class="btn typo small"><span class="q">?</span></div>
  </div>
  <div class="cap">4 · typographique — craie ambre, zéro chrome</div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Méthode audio — TEST piste spatiale</title>
<meta name="theme-color" content="#0e0b22">

<!-- Polices de l'app (pour le bas existant) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600&family=Fraunces:ital,wght@0,500;1,400&family=Inter:wght@400;500;700&family=JetBrains+Mono:wght@400;600;700&family=Lilita+One&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<!-- Polices du nouveau design (carte + fond) -->
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Fredoka:wght@500;600;700&family=Space+Mono:wght@400;700&family=Atkinson+Hyperlegible:wght@400;700&family=Lexend:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- Styles de l'app (donne tout le style du BAS existant) -->
<link rel="stylesheet" href="styles.css">

<!-- ════════════════════════════════════════════════════════════════
     OVERRIDE « piste spatiale » — fond + effets + carte du nouveau design.
     Ne touche pas styles.css ; surcharge seulement ce qui est nécessaire.
     ════════════════════════════════════════════════════════════════ -->
<style>
  /* Téléphone aux dimensions du design (390×844), fond spatial */
  .phone {
    width: 390px;
    min-height: 844px;
    background: #0e0b22;
    color: #e9eef5;
    font-family: 'Sora', sans-serif;
  }

  /* ── Keyframes du design ── */
  @keyframes breathe   { 0%,100%{filter:drop-shadow(0 1px 1px rgba(0,0,0,.4))} 50%{filter:drop-shadow(0 2px 8px rgba(245,181,34,.35))} }
  @keyframes livepulse { 0%,100%{box-shadow:0 0 0 0 rgba(70,224,138,.55)} 70%{box-shadow:0 0 0 7px rgba(70,224,138,0)} }
  @keyframes floaty    { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
  @keyframes risein    { 0%{opacity:0;transform:translateY(10px)} 100%{opacity:1;transform:translateY(0)} }
  @keyframes borderflow{ 0%{background-position:0% 50%} 100%{background-position:300% 50%} }
  @keyframes neb1 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(34px,26px) scale(1.18)} }
  @keyframes neb2 { 0%,100%{transform:translate(0,0) scale(1.05)} 50%{transform:translate(-38px,-22px) scale(1.26)} }
  @keyframes neb3 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(24px,-32px) scale(1.16)} }
  @keyframes aurora1 { 0%,100%{transform:translateX(0) skewX(-12deg) scaleY(1);opacity:.7} 50%{transform:translateX(8%) skewX(8deg) scaleY(1.18);opacity:1} }
  @keyframes aurora2 { 0%,100%{transform:translateX(0) skewX(10deg) scaleY(1.05);opacity:.55} 50%{transform:translateX(-10%) skewX(-10deg) scaleY(1.3);opacity:.95} }
  @keyframes aurora3 { 0%,100%{transform:translateX(0) skewX(-6deg) scaleY(.95);opacity:.5} 50%{transform:translateX(7%) skewX(12deg) scaleY(1.22);opacity:.85} }

  /* ── Carte centrale ── */
  .sp-focus {
    position: absolute; top: 39%; left: 0; right: 0;
    transform: translateY(-50%); z-index: 2; padding: 0 22px;
  }
  .sp-card {
    position: relative; z-index: 1; border-radius: 26px; padding: 20px;
    background: linear-gradient(180deg, rgba(5,6,14,.9), rgba(3,4,10,.88));
    box-shadow: 0 0 24px rgba(34,211,238,.35), 0 30px 70px rgba(0,0,0,.6);
    overflow: hidden;
  }
  /* Bordure animée en dégradé (effet clé du design) */
  .sp-card::before {
    content: ""; position: absolute; inset: 0; border-radius: 26px; padding: 1px;
    background: linear-gradient(120deg,#22d3ee,#3b82f6,#06b6d4,#67e8f9,#0ea5e9,#22d3ee);
    background-size: 300% 300%; animation: borderflow 6s linear infinite;
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
  }
  .sp-pill {
    display: inline-flex; align-items: center; justify-content: center;
    padding: 9px 18px; border-radius: 13px; cursor: pointer; transition: .2s;
    border: 1px solid rgba(79,209,181,.7); background: rgba(79,209,181,.18);
    box-shadow: 0 0 18px rgba(79,209,181,.3);
  }
  .sp-pill:hover { background: rgba(79,209,181,.28); border-color: rgba(79,209,181,.95); }
  .sp-pill span {
    font-family: 'Sora', sans-serif; font-weight: 700; font-size: 12px; letter-spacing: 2.5px;
    background: linear-gradient(180deg,#ffdf7e 0%,#f5b522 55%,#ec9f0d 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; color: transparent;
  }
  .sp-fr {
    font-family: 'Atkinson Hyperlegible', sans-serif; font-weight: 700;
    font-size: 25px; color: #d6dae2; letter-spacing: .2px;
  }
  .sp-connector { display: flex; align-items: center; gap: 12px; margin: 16px 0; }
  .sp-connector .line { flex: 1; height: 1px; }
  .sp-connector .l { background: linear-gradient(90deg, rgba(34,211,238,.05), rgba(34,211,238,.55)); }
  .sp-connector .r { background: linear-gradient(90deg, rgba(34,211,238,.55), rgba(34,211,238,.05)); }
  .sp-en {
    font-family: 'Fredoka', sans-serif; font-weight: 600; font-size: 44px;
    line-height: 1.08; letter-spacing: .5px; text-wrap: balance;
    color: #f5b522;
    animation: breathe 3.6s ease-in-out infinite;
  }
  .sp-phon {
    font-family: 'Lexend', sans-serif; font-weight: 500; font-size: 20px;
    letter-spacing: .3px; color: #9bf0dd; margin-top: 16px;
  }

  /* ── Status bar du design ── */
  .sp-status {
    position: relative; z-index: 2; display: flex; align-items: center;
    justify-content: space-between; padding: 20px 24px 0;
  }
  .sp-status .lbl { font-family: 'Space Mono', monospace; font-size: 12px; letter-spacing: 2.5px; color: #7d8ca0; }

  /* On masque l'overlay-top vintage (remplacé par la status bar spatiale) */
  .overlay-top { display: none; }

  /* Le bas existant reste, mais on neutralise son dégradé vintage pour
     qu'il se fonde dans le fond spatial. */
  .overlay-bottom {
    background: linear-gradient(180deg, transparent, rgba(7,13,24,.85) 38%);
  }

  /* Bouton question : plus petit (50px) + flottement doux + halo AMBRE derrière
     l'icône (override local, ne touche pas styles.css partagé) */
  .q-fab {
    width: 50px; height: 50px;
    animation: q-floaty 4s ease-in-out infinite;
  }
  /* Halo ambre derrière l'icône — enfant du bouton, donc suit son flottement */
  .q-fab::before {
    content: ''; position: absolute; inset: -40%; z-index: -1; pointer-events: none;
    border-radius: 50%;
    background: radial-gradient(closest-side, rgba(245,181,34,.75), rgba(245,181,34,0) 72%);
    filter: blur(8px);
    animation: q-halo-amber 3.8s ease-in-out infinite;
  }
  @keyframes q-halo-amber {
    0%,100% { opacity: .6; transform: scale(.92); }
    50%     { opacity: 1;  transform: scale(1.08); }
  }
  @keyframes q-floaty { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
</style>
</head>
<body>

<div class="phone">

  <!-- ░░ FOND SPATIAL + EFFETS (du nouveau design) ░░ -->
  <div style="position:absolute;inset:0;background:url('assets/space-bg3.png') center/cover no-repeat;pointer-events:none;z-index:0"></div>
  <div style="position:absolute;inset:0;background:radial-gradient(80% 55% at 100% 0%,rgba(4,4,16,.78),rgba(4,4,16,.3) 45%,transparent 70%);pointer-events:none;z-index:0"></div>

  <!-- rideaux d'aurore -->
  <div style="position:absolute;inset:-10% -10% 30% -10%;z-index:0;pointer-events:none;mix-blend-mode:screen;filter:blur(26px);opacity:.85">
    <div style="position:absolute;top:0;left:8%;width:60%;height:78%;background:linear-gradient(115deg,transparent 0%,rgba(56,189,248,.0) 18%,rgba(59,130,246,.55) 42%,rgba(124,58,237,.45) 62%,rgba(168,85,247,.0) 82%);transform-origin:top center;animation:aurora1 14s ease-in-out infinite"></div>
    <div style="position:absolute;top:-6%;left:34%;width:58%;height:72%;background:linear-gradient(70deg,transparent 0%,rgba(99,102,241,.0) 20%,rgba(139,92,246,.5) 46%,rgba(76,29,149,.42) 66%,rgba(30,64,175,.0) 86%);transform-origin:top center;animation:aurora2 18s ease-in-out infinite"></div>
    <div style="position:absolute;top:2%;left:-4%;width:50%;height:64%;background:linear-gradient(95deg,transparent 0%,rgba(45,212,191,.0) 22%,rgba(56,189,248,.4) 48%,rgba(67,56,202,.36) 70%,rgba(91,33,182,.0) 90%);transform-origin:top center;animation:aurora3 22s ease-in-out infinite"></div>
  </div>

  <!-- nébuleuses violettes / bleu nuit -->
  <div style="position:absolute;inset:0;z-index:0;pointer-events:none;mix-blend-mode:screen">
    <div style="position:absolute;top:-120px;right:-160px;width:520px;height:520px;background:radial-gradient(closest-side,rgba(91,33,182,.8),rgba(67,20,140,.4) 50%,transparent 74%);filter:blur(16px);animation:neb1 20s ease-in-out infinite"></div>
    <div style="position:absolute;top:280px;left:-200px;width:560px;height:560px;background:radial-gradient(closest-side,rgba(76,29,149,.78),rgba(55,18,110,.36) 52%,transparent 76%);filter:blur(20px);animation:neb2 26s ease-in-out infinite"></div>
    <div style="position:absolute;bottom:-40px;right:-120px;width:500px;height:500px;background:radial-gradient(closest-side,rgba(88,28,170,.72),rgba(60,20,120,.32) 54%,transparent 78%);filter:blur(22px);animation:neb3 30s ease-in-out infinite"></div>
    <div style="position:absolute;top:-100px;left:-180px;width:520px;height:520px;background:radial-gradient(closest-side,rgba(20,38,92,.6),rgba(14,26,66,.28) 52%,transparent 76%);filter:blur(20px);animation:neb2 24s ease-in-out infinite"></div>
    <div style="position:absolute;top:360px;right:-200px;width:540px;height:540px;background:radial-gradient(closest-side,rgba(18,34,84,.56),rgba(12,24,60,.26) 54%,transparent 78%);filter:blur(22px);animation:neb1 28s ease-in-out infinite"></div>
  </div>

  <!-- nébuleuses sombres (assombrissent le fond) -->
  <div style="position:absolute;inset:0;z-index:0;pointer-events:none">
    <div style="position:absolute;top:-120px;left:-160px;width:520px;height:520px;background:radial-gradient(closest-side,rgba(8,7,24,.78),rgba(10,9,30,.4) 50%,transparent 74%);filter:blur(22px);animation:neb2 24s ease-in-out infinite"></div>
    <div style="position:absolute;top:340px;right:-180px;width:540px;height:540px;background:radial-gradient(closest-side,rgba(10,8,28,.74),rgba(12,10,34,.36) 52%,transparent 76%);filter:blur(24px);animation:neb1 28s ease-in-out infinite"></div>
    <div style="position:absolute;bottom:-140px;left:-120px;width:500px;height:500px;background:radial-gradient(closest-side,rgba(7,6,22,.7),rgba(9,8,28,.32) 54%,transparent 78%);filter:blur(26px);animation:neb3 32s ease-in-out infinite"></div>
  </div>

  <!-- ░░ STATUS BAR (du design) ░░ -->
  <div class="sp-status">
    <div style="display:flex;align-items:center;gap:9px">
      <span style="width:5px;height:5px;border-radius:50%;background:#4fd1b5;box-shadow:0 0 8px rgba(79,209,181,.9)"></span>
      <span class="lbl" id="spLesson">LEÇON X1)</span>
    </div>
    <span style="width:9px;height:9px;border-radius:50%;background:#46e08a;animation:livepulse 2.2s ease-out infinite"></span>
  </div>

  <!-- ░░ TABLEAU = CARTE DU NOUVEAU DESIGN ░░ -->
  <div class="sp-focus">
    <div class="sp-card">
      <!-- pastille type (clic = relire) -->
      <div style="display:flex;align-items:center;justify-content:center;gap:10px">
        <div class="sp-pill" id="spReplay"><span>TRADUCTION</span></div>
      </div>
      <!-- FR -->
      <div style="margin-top:22px;text-align:center">
        <div class="sp-fr" id="spFr">La + Table</div>
      </div>
      <!-- connecteur -->
      <div class="sp-connector">
        <div class="line l"></div>
        <img src="assets/translate-icon.png" width="40" height="40" style="flex:none;display:block" alt="">
        <div class="line r"></div>
      </div>
      <!-- EN + prononciation -->
      <div style="text-align:center">
        <div class="sp-en" id="spEn">The + Table</div>
        <div class="sp-phon" id="spPhon">Ze + T-Aïe-Beul</div>
      </div>
    </div>
  </div>

  <!-- ░░ BAS EXISTANT DE L'APP (gardé tel quel) ░░ -->
  <div class="overlay-bottom panel disabled" id="panel">

    <!-- Personnages -->
    <div class="chars" id="vocalStage">
      <div class="char-item" id="vs-prof" data-role="prof" data-pos="center">
        <div class="char-av">
          <div class="char-rings"></div>
          <svg viewBox="0 0 56 62" fill="none" aria-hidden="true"><circle cx="28" cy="19" r="13" fill="white"/><path d="M4 60c0-18 48-18 48 0" fill="white"/></svg>
        </div>
        <div class="char-name" id="vsl-prof">Professeur</div>
      </div>
      <div class="char-item" id="vs-eleve1" data-role="eleve1" data-pos="left">
        <div class="char-av">
          <div class="char-rings"></div>
          <svg viewBox="0 0 56 62" fill="none" aria-hidden="true"><circle cx="28" cy="19" r="13" fill="white"/><path d="M4 60c0-18 48-18 48 0" fill="white"/></svg>
        </div>
        <div class="char-name" id="vsl-eleve1">Sophie</div>
      </div>
      <div class="char-item" id="vs-eleve2" data-role="eleve2" data-pos="right">
        <div class="char-av">
          <div class="char-rings"></div>
          <svg viewBox="0 0 56 62" fill="none" aria-hidden="true"><circle cx="28" cy="19" r="13" fill="white"/><path d="M4 60c0-18 48-18 48 0" fill="white"/></svg>
        </div>
        <div class="char-name" id="vsl-eleve2">Julien</div>
      </div>
    </div>

    <!-- Barre de progression -->
    <div class="progress-wrap">
      <span class="progress-pct" id="progressPct">16%</span>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:16%"></div>
      </div>
      <span class="progress-steps" id="progressSteps">8 / 49</span>
    </div>

    <!-- Actions normales -->
    <div class="normal-actions">
      <button class="act-btn" id="restartBtn">↺</button>
      <button class="act-btn primary play-btn" id="playBtn">
        <svg class="ico-play" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
        <svg class="ico-pause" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
      </button>
      <button class="act-btn" id="closeBtn">✕</button>
    </div>

  </div>

  <!-- ░░ BOUTON QUESTION AU PROF (bulle de chat violette 3D) ░░ -->
  <button class="q-fab" id="qFab" title="Poser une question au professeur" aria-label="Poser une question au professeur">
    <img src="assets/icons8-comments-94.png" alt="" style="width:100%;height:100%;display:block;object-fit:contain">
  </button>

</div>

<script>
  /* ── Démo statique : fait défiler les 3 cartes d'exemple via le bouton play.
        Aucun moteur audio ici — page purement visuelle pour évaluer la piste. */
  (function(){
    const cards = [
      { lesson: "LEÇON X1)", fr: "La + Table",                              en: "The + Table",                  phon: "Ze + T-Aïe-Beul" },
      { lesson: "LEÇON X2)", fr: "Je voudrais un café, s'il vous plaît",    en: "I would like a coffee, please", phon: "Aï woud-laïk eu co-fi, pliz" },
      { lesson: "LEÇON X3)", fr: "Où est la gare ?",                        en: "Where is the station?",        phon: "Wère iz ze stéï-cheune" },
    ];
    let i = 0;
    const $ = id => document.getElementById(id);
    function render(){
      const c = cards[i];
      $('spLesson').textContent = c.lesson;
      $('spFr').textContent = c.fr;
      $('spEn').textContent = c.en;
      $('spPhon').textContent = c.phon;
      const pct = Math.round(((8 + i) / 49) * 100);
      $('progressPct').textContent = pct + '%';
      $('progressFill').style.width = pct + '%';
      $('progressSteps').textContent = (8 + i) + ' / 49';
    }
    function bump(el){ if(!el) return; el.style.transition='transform .15s'; el.style.transform='scale(.97)'; setTimeout(()=>el.style.transform='',150); }

    $('playBtn').addEventListener('click', () => { i = (i + 1) % cards.length; render(); bump($('playBtn')); });
    $('restartBtn').addEventListener('click', () => { i = 0; render(); });
    $('spReplay').addEventListener('click', () => bump($('spReplay')));  // pastille = relire (pulse visuel)
    $('qFab').addEventListener('click', () => bump($('qFab')));          // visuel seul (pas de chat dans la page de test)
    render();
  })();
</script>
</body>
</html>
